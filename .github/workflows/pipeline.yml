name: Pipeline

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download Hytale Downloader CLI
        run: |
          curl -L https://downloader.hytale.com/hytale-downloader.zip -o hytale-downloader.zip
          unzip hytale-downloader.zip
          mv hytale-downloader-linux-amd64 hytale-downloader
          chmod +x hytale-downloader

      # Writes the auth token from the secret so the downloader can authenticate.
      # The token may be refreshed on each use — the "Update Hytale credentials secret" step
      # saves the updated file back to the secret after every run.
      - name: Restore Hytale credentials
        env:
          HYTALE_AUTH_JSON: ${{ secrets.HYTALE_AUTH_JSON }}
        run: echo "$HYTALE_AUTH_JSON" > ./.hytale-downloader-credentials.json

      # Used to key the cache — if the version matches the previous run the 1.4 GB download
      # is skipped entirely. Only when Hytale ships a new build does the cache get invalidated
      # and the assets re-downloaded.
      - name: Get Hytale version
        id: hytale-version
        run: echo "version=$(./hytale-downloader -print-version -patchline pre-release)" >> $GITHUB_OUTPUT

      - name: Cache Hytale assets
        id: cache-hytale
        uses: actions/cache@v4
        with:
          path: hytale-home
          key: hytale-assets-pre-release-${{ steps.hytale-version.outputs.version }}

      # Extracts into the install path expected by the dev.scaffoldit plugin:
      # $hytale.home_path/install/$patchline/package/game/$version/Assets.zip
      - name: Download Hytale server files
        if: steps.cache-hytale.outputs.cache-hit != 'true'
        run: |
          mkdir -p hytale-home/install/pre-release/package/game/latest
          ./hytale-downloader -patchline pre-release -download-path hytale-home/game.zip
          unzip hytale-home/game.zip -d hytale-home/install/pre-release/package/game/latest
          rm hytale-home/game.zip

      # Runs even on failure to capture any token refresh that happened during
      # -print-version or the download step.
      - name: Update Hytale credentials secret
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f ./.hytale-downloader-credentials.json ]; then
            cat ./.hytale-downloader-credentials.json | gh secret set HYTALE_AUTH_JSON --repo ${{ github.repository }}
          fi

      - name: Build
        run: ./gradlew build -Phytale.home_path=${{ github.workspace }}/hytale-home

      - name: Package JAR
        if: github.ref == 'refs/heads/main'
        run: ./gradlew jar -Phytale.home_path=${{ github.workspace }}/hytale-home

      - name: Remove sources JAR
        run: rm -f build/libs/*-sources.jar

      - name: Set image name
        if: github.ref == 'refs/heads/main'
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.name }}:latest

      - name: Release JAR
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: build/libs/Wartale-*.jar
