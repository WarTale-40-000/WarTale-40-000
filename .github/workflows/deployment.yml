name: Build and Publish

on:
  push:
    branches:
        - main

# Prevent simultaneous main pushes from racing over :latest Docker tag and release assets.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Get project version
        id: version
        run: |
          version=$(grep -oP '^version\s*=\s*\K\S+' gradle.properties)
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check Format
        run: ./gradlew spotlessCheck

      - name: Lint Project
        run: ./gradlew check

      - name: Build
        run: ./gradlew build

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: test-reports
          path: build/reports/

      # Upload the plugin JAR (excluding sources) so the publish job can use it
      # without re-running the full build.
      - name: Upload JAR artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: plugin-jar
          path: |
            build/libs/Wartale-*.jar
            !build/libs/*-sources.jar
            !build/libs/*-javadoc.jar

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Download JAR artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: plugin-jar
          path: build/libs/

      - name: Download Hytale Downloader CLI
        run: |
          curl -L https://downloader.hytale.com/hytale-downloader.zip -o hytale-downloader.zip
          unzip hytale-downloader.zip
          mv hytale-downloader-linux-amd64 hytale-downloader
          chmod +x hytale-downloader

      # Writes the auth token from the secret so the downloader can authenticate.
      # The token may be refreshed on each use — the "Update Hytale credentials secret" step
      # saves the updated file back to the secret after every run.
      - name: Restore Hytale credentials
        env:
          HYTALE_AUTH_JSON: ${{ secrets.HYTALE_AUTH_JSON }}
        run: echo "$HYTALE_AUTH_JSON" > ./.hytale-downloader-credentials.json

      # Used to key the cache — if the version matches the previous run the 1.4 GB download
      # is skipped entirely. Only when Hytale ships a new build does the cache get invalidated
      # and the assets re-downloaded.
      - name: Get Hytale version
        id: hytale-version
        run: echo "version=$(./hytale-downloader -print-version -patchline pre-release)" >> $GITHUB_OUTPUT

      - name: Cache Hytale assets
        id: cache-hytale
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: hytale-home
          key: hytale-assets-pre-release-${{ steps.hytale-version.outputs.version }}
          # Fall back to the most recent entry if the exact version key is missing
          # (e.g. after a -print-version network error) to avoid a full 1.4 GB re-download.
          restore-keys: |
            hytale-assets-pre-release-

      # Extracts into the install path expected by the mod's Dockerfile, which copies from there into the image.:
      - name: Download Hytale server files
        if: steps.cache-hytale.outputs.cache-hit != 'true'
        run: |
          mkdir -p hytale-home/install/pre-release/package/game/latest
          ./hytale-downloader -patchline pre-release -download-path hytale-home/game.zip
          unzip -o hytale-home/game.zip -d hytale-home/install/pre-release/package/game/latest
          rm hytale-home/game.zip

      # Runs even on failure to capture any token refresh that happened during
      # -print-version or the download step.
      - name: Update Hytale credentials secret
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ -f ./.hytale-downloader-credentials.json ]; then
            cat ./.hytale-downloader-credentials.json | gh secret set HYTALE_AUTH_JSON --repo "$GH_REPO"
          fi
          rm -f ./.hytale-downloader-credentials.json

      - name: Set image name
        id: image
        env:
          GH_REPO: ${{ github.repository }}
        run: echo "name=ghcr.io/$(echo "$GH_REPO" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: ./Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Tag with semver and commit SHA to enable precise rollbacks; :latest for convenience.
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ needs.build.outputs.version }}
            ${{ steps.image.outputs.name }}:${{ github.sha }}

      - name: Release JAR
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: v${{ needs.build.outputs.version }}
          files: build/libs/Wartale-*.jar
