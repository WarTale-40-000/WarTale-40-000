name: Build and Publish

on:
  push:
    branches:
      - main

# Prevent simultaneous main pushes from racing over :latest Docker tag and release assets.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Get project version
        id: version
        run: |
          version=$(grep -oP '^version\s*=\s*\K\S+' gradle.properties)
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: test-reports
          path: build/reports/

      # Upload the plugin JAR (excluding sources) so the publish job can use it
      # without re-running the full build.
      - name: Upload JAR artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: plugin-jar
          path: |
            build/libs/Wartale-*.jar
            !build/libs/*-sources.jar
            !build/libs/*-javadoc.jar

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Download JAR artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: plugin-jar
          path: build/libs/

      - name: Set image name
        id: image
        env:
          GH_REPO: ${{ github.repository }}
        run: echo "name=ghcr.io/$(echo "$GH_REPO" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: .
          file: docker/Dockerfile
          push: true
          # Tag with semver and commit SHA to enable precise rollbacks; :latest for convenience.
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ needs.build.outputs.version }}
            ${{ steps.image.outputs.name }}:${{ github.sha }}

      - name: Release JAR
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          tag_name: v${{ needs.build.outputs.version }}
          files: build/libs/Wartale-*.jar
